<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-Pop Karaoke Search | TJ & KY Sync</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="hero-section">
            <div class="logo-area">
                <h1>Karaoke Search</h1>
                <p>TJ & KY J-Pop Finder</p>
            </div>
            
            <nav class="tab-navigation">
                <button class="tab-btn active" data-tab="search">Search</button>
                <button class="tab-btn" data-tab="charts">Top Charts</button>
                <button class="tab-btn" data-tab="sync">My Music Sync</button>
            </nav>

            <div id="searchTab" class="tab-content active">
                <div class="search-wrapper">
                    <div class="search-bar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <input type="text" id="searchInput" placeholder="노래 제목, 가수 또는 Spotify/Melon URL 입력">
                    </div>
                </div>
            </div>

            <div id="chartsTab" class="tab-content">
                <p class="tab-desc">인기 J-Pop을 한 번의 클릭으로 검색해보세요.</p>
            </div>

            <div id="syncTab" class="tab-content">
                <div class="sync-panel">
                    <p class="tab-desc">Spotify와 연결하여 내가 듣는 노래를 바로 찾아보세요.</p>
                    <button id="spotifyLoginBtn" class="spotify-btn">Connect Spotify</button>
                </div>
                <div id="spotifyTracks" class="spotify-tracks-list hidden">
                    <!-- Spotify tracks will appear here -->
                </div>
            </div>
        </header>

        <main class="results-area">
            <div id="loadingIndicator" class="loading hidden">
                <div class="spinner"></div>
                <span>검색 중...</span>
            </div>
            
            <div id="resultsContainer" class="results-grid">
                <div class="placeholder-message">
                    <p>원하는 노래를 검색해보세요.</p>
                </div>
            </div>
        </main>

        <footer>
            <p>Data provided by api.manana.kr & Spotify Web API</p>
        </footer>
    </div>
    
    <!-- Settings Modal for Spotify Client ID -->
    <div id="settingsModal" class="modal hidden">
        <div class="modal-content">
            <h3>Spotify Integration Setup</h3>
            <p>Spotify를 연동하려면 개발자 대시보드에서 발급받은 <strong>Client ID</strong>가 필요합니다.</p>
            <input type="text" id="spotifyClientId" placeholder="Spotify Client ID">
            <button id="saveSettingsBtn">저장하기</button>
            <button id="closeModalBtn" class="close-btn">닫기</button>
        </div>
    </div>

    <script src="main.js" type="module"></script>
</body>
</html>
